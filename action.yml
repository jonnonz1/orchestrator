name: "Orchestrator Task"
description: "Run a prompt against an Orchestrator server and optionally comment the result on the PR."
branding:
  icon: "cpu"
  color: "purple"
inputs:
  orchestrator-url:
    description: "Base URL of the Orchestrator server (e.g. http://orchestrator.internal:8080)."
    required: true
  orchestrator-token:
    description: "Bearer token for the Orchestrator server. Store as a secret."
    required: true
  prompt:
    description: "The prompt to run. Can reference files in the repo via ${{ github.workspace }}."
    required: true
  runtime:
    description: "Which agent runtime to use (claude, shell, …)."
    required: false
    default: "claude"
  ram-mb:
    description: "VM RAM in MB."
    required: false
    default: "4096"
  timeout:
    description: "Task timeout in seconds."
    required: false
    default: "600"
  comment-on-pr:
    description: "If 'true' and the workflow runs on a pull_request, post the result as a PR comment."
    required: false
    default: "false"
outputs:
  task-id:
    description: "The Orchestrator task ID"
    value: ${{ steps.run.outputs.task-id }}
  status:
    description: "Final task status"
    value: ${{ steps.run.outputs.status }}
  cost-usd:
    description: "Claude cost in USD (claude runtime only)"
    value: ${{ steps.run.outputs.cost-usd }}
runs:
  using: "composite"
  steps:
    - name: Submit Orchestrator task
      id: run
      shell: bash
      env:
        ORCHESTRATOR_URL: ${{ inputs.orchestrator-url }}
        ORCHESTRATOR_TOKEN: ${{ inputs.orchestrator-token }}
        ORCHESTRATOR_PROMPT: ${{ inputs.prompt }}
        ORCHESTRATOR_RUNTIME: ${{ inputs.runtime }}
        ORCHESTRATOR_RAM: ${{ inputs.ram-mb }}
        ORCHESTRATOR_TIMEOUT: ${{ inputs.timeout }}
      run: |
        set -euo pipefail

        payload=$(jq -n \
          --arg prompt "$ORCHESTRATOR_PROMPT" \
          --arg runtime "$ORCHESTRATOR_RUNTIME" \
          --argjson ram "$ORCHESTRATOR_RAM" \
          --argjson to "$ORCHESTRATOR_TIMEOUT" \
          '{prompt: $prompt, runtime: $runtime, ram_mb: $ram, timeout: $to}')

        id=$(curl -fsS -H "Authorization: Bearer $ORCHESTRATOR_TOKEN" -H "Content-Type: application/json" \
          -X POST "$ORCHESTRATOR_URL/api/v1/tasks" -d "$payload" | jq -r .id)

        echo "task-id=$id" >> "$GITHUB_OUTPUT"
        echo "::notice::orchestrator task $id started"

        while true; do
          t=$(curl -fsS -H "Authorization: Bearer $ORCHESTRATOR_TOKEN" "$ORCHESTRATOR_URL/api/v1/tasks/$id")
          status=$(echo "$t" | jq -r .status)
          case "$status" in
            completed|failed|cancelled) break ;;
          esac
          sleep 2
        done

        cost=$(echo "$t" | jq -r '.cost_usd // 0')
        output=$(echo "$t" | jq -r '.output // ""')

        echo "status=$status" >> "$GITHUB_OUTPUT"
        echo "cost-usd=$cost" >> "$GITHUB_OUTPUT"

        {
          echo "output<<ORCHEOF"
          echo "$output"
          echo "ORCHEOF"
        } >> "$GITHUB_OUTPUT"

        if [[ "$status" != "completed" ]]; then
          echo "::error::Orchestrator task $id finished with status=$status"
          exit 1
        fi

    - name: Comment on PR
      if: ${{ inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const taskId = '${{ steps.run.outputs.task-id }}';
          const status = '${{ steps.run.outputs.status }}';
          const cost = '${{ steps.run.outputs.cost-usd }}';
          const body = [
            '### Orchestrator task result',
            `- **Task:** \`${taskId}\``,
            `- **Status:** ${status}`,
            cost !== '0' ? `- **Cost:** \$${cost}` : null,
          ].filter(Boolean).join('\n');
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body,
          });
