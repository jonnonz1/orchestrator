name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        go-version: ["1.26.2"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -timeout 3m ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./cmd/... ./internal/...

      - name: Build host binary (without embedded frontend)
        run: |
          mkdir -p cmd/orchestrator/web-dist
          echo "<!doctype html><title>stub</title>" > cmd/orchestrator/web-dist/index.html
          go build -o bin/orchestrator ./cmd/orchestrator

      - name: Build guest agent
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/agent ./cmd/agent

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: npm audit
        run: npm audit --production --audit-level=high

      - run: npm run build

  scripts:
    name: Shell scripts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
