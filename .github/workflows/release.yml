name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web && npm ci && npm run build && cd ..
          rm -rf cmd/orchestrator/web-dist
          cp -r web/dist cmd/orchestrator/web-dist

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build -ldflags="-X main.Version=${VERSION} -s -w" -o bin/orchestrator ./cmd/orchestrator
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/agent ./cmd/agent

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/orchestrator-${GITHUB_REF_NAME}-linux-amd64.tar.gz -C bin orchestrator agent
          sha256sum dist/*.tar.gz > dist/SHA256SUMS

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/orchestrator-*-linux-amd64.tar.gz
            dist/SHA256SUMS
          body: |
            See [CHANGELOG.md](CHANGELOG.md) for what changed.

            Install:
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/orchestrator-${{ github.ref_name }}-linux-amd64.tar.gz
            tar -xzf orchestrator-*.tar.gz
            sudo install -m 0755 orchestrator /usr/local/bin/
            ```
