<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="dish" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Dish — outer ring -->
  <ellipse cx="256" cy="300" rx="200" ry="110" fill="url(#dish)" stroke="#818cf8" stroke-width="6"/>

  <!-- Dish interior shadow -->
  <ellipse cx="256" cy="300" rx="170" ry="90" fill="#eef2ff" stroke="#a5b4fc" stroke-width="3"/>

  <!-- Flame (Firecracker) inside the dish -->
  <path d="M256 160 C230 210, 200 240, 210 290 C215 320, 240 340, 256 340 C272 340, 297 320, 302 290 C312 240, 282 210, 256 160Z" fill="url(#flame)"/>

  <!-- Inner flame core -->
  <path d="M256 220 C244 250, 230 265, 236 295 C240 315, 250 325, 256 325 C262 325, 272 315, 276 295 C282 265, 268 250, 256 220Z" fill="url(#inner)"/>

  <!-- Dish rim highlight -->
  <ellipse cx="256" cy="208" rx="190" ry="40" fill="none" stroke="#818cf8" stroke-width="5" opacity="0.6"/>

  <!-- Three small "culture" dots in the dish -->
  <circle cx="190" cy="310" r="12" fill="#a78bfa" opacity="0.5"/>
  <circle cx="320" cy="315" r="10" fill="#a78bfa" opacity="0.4"/>
  <circle cx="260" cy="350" r="8" fill="#a78bfa" opacity="0.3"/>
</svg>
